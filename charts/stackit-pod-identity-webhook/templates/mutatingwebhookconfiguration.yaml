apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "stackit-pod-identity-webhook.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.certmanager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "stackit-pod-identity-webhook.fullname" . }}-cert
  {{- end }}
webhooks:
  - name: mpod.stackit.cloud
    clientConfig:
      service:
        name: {{ include "stackit-pod-identity-webhook.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: "/mutate--v1-pod"
      {{- if not .Values.certmanager.enabled }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy | default "Ignore" }}
    namespaceSelector:
      matchExpressions:
        {{- if .Values.webhook.excludeKubeSystem }}
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
        {{- end }}
        - key: workload-identity.stackit.cloud/skip-pod-identity-webhook
          operator: DoesNotExist
    objectSelector:
      matchExpressions:
        - key: workload-identity.stackit.cloud/skip-pod-identity-webhook
          operator: DoesNotExist
